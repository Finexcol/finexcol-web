<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Finexcol</title>
    <style>
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px}
        .card{background:white;padding:40px;border-radius:10px;max-width:500px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
        h1{color:#333;margin:0 0 10px 0}
        p{color:#666;margin:0 0 30px 0}
        .form-group{margin-bottom:20px}
        label{display:block;margin-bottom:5px;color:#333;font-weight:bold}
        input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;font-family:Arial;box-sizing:border-box}
        textarea{resize:vertical;min-height:100px}
        button{width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:5px;font-size:16px;font-weight:bold;cursor:pointer}
        button:hover{opacity:0.9}
        .success{background:#d4edda;color:#155724;padding:15px;border-radius:5px;margin-bottom:20px;border:1px solid #c3e6cb;display:none}
    </style>
</head>
<body>
<div class="card">
    <h1>Contacto</h1>
    <p>¿Tienes preguntas? ¡Estamos aquí para ayudarte!</p>
    <div class="success" id="msg">✅ ¡Gracias! Hemos recibido tu solicitud.</div>
    <form id="f">
        <div class="form-group">
            <label>Nombre Completo *</label>
            <input type="text" id="n" required>
        </div>
        <div class="form-group">
            <label>Correo Electrónico *</label>
            <input type="email" id="e" required>
        </div>
        <div class="form-group">
            <label>Número de Celular *</label>
            <input type="tel" id="c" required>
        </div>
        <div class="form-group">
            <label>Mensaje *</label>
            <textarea id="m" required></textarea>
        </div>
        <button type="submit">Enviar Solicitud</button>
    </form>
</div>

<script>
document.getElementById('f').addEventListener('submit', function(e){
    e.preventDefault();
    var s=JSON.parse(localStorage.getItem('s'))||[];
    s.push({n:document.getElementById('n').value,e:document.getElementById('e').value,c:document.getElementById('c').value,m:document.getElementById('m').value,d:new Date().toLocaleString()});
    localStorage.setItem('s',JSON.stringify(s));
    document.getElementById('msg').style.display='block';
    document.getElementById('f').reset();
    setTimeout(function(){document.getElementById('msg').style.display='none'},3000);
});
</script>
</body>
</html>
