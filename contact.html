<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Finexcol | Créditos Rápidos</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .contact-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .contact-card h1 {
            color: #333;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .contact-card p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .submit-btn.loading::after {
            content: ' Enviando...';
        }

        .success-message {
            display: none;
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            animation: slideIn 0.3s ease-out;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            display: none;
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            animation: slideIn 0.3s ease-out;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .contact-card {
                padding: 30px 20px;
            }

            .contact-card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <div class="contact-card">
            <h1>Contacto</h1>
            <p>¿Tienes preguntas? ¡Estamos aquí para ayudarte!</p>

            <div class="success-message" id="successMessage">
                ✅ ¡Gracias! Hemos recibido tu solicitud. En breve te enviaremos un correo con el plan de pagos.
            </div>

            <div class="error-message" id="errorMessage">
                ❌ Hubo un error al enviar tu solicitud. Por favor, intenta de nuevo.
            </div>

            <form id="contactForm">
                <div class="form-group">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan García">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label for="celular">Número de Celular *</label>
                    <input type="tel" id="celular" name="celular" required placeholder="+57 300 123 4567">
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje *</label>
                    <textarea id="mensaje" name="mensaje" required placeholder="Cuéntanos cómo podemos ayudarte..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Enviar Solicitud</button>
            </form>

            <div class="back-link">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

            // Limpiar mensajes anteriores
            successMessage.classList.remove('show');
            errorMessage.classList.remove('show');

            // Obtener datos del formulario
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const celular = document.getElementById('celular').value;
            const mensaje = document.getElementById('mensaje').value;

            // Deshabilitar botón
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');

            try {
                // Enviar al servidor
                const response = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        nombreCliente: nombre,
                        emailCliente: email,
                        celular: celular,
                        mensaje: mensaje,
                        monto: 1000000, // Valores por defecto para la tabla
                        plazo: 12,
                        tasaInteres: 2.5,
                        cuotaMensual: 90000,
                        cuotas: generarCuotas(1000000, 12, 2.5) // Se genera en el frontend
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.classList.add('show');
                    document.getElementById('contactForm').reset();
                } else {
                    throw new Error(data.error || 'Error desconocido');
                }
            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = `❌ ${error.message}`;
                errorMessage.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        });

        // Función para generar cuotas (igual a la del simulador)
        function generarCuotas(monto, plazo, tasaMensual) {
            const cuotas = [];
            let saldoActual = parseFloat(monto);
            const cuotaMensual = calcularCuota(monto, plazo, tasaMensual);

            for (let i = 1; i <= plazo; i++) {
                const interes = saldoActual * (tasaMensual / 100);
                const capital = cuotaMensual - interes;
                const saldoFinal = Math.max(0, saldoActual - capital);

                cuotas.push({
                    cuota: i,
                    saldoInicial: saldoActual,
                    pago: cuotaMensual,
                    interes: interes,
                    capital: capital,
                    saldoFinal: saldoFinal
                });

                saldoActual = saldoFinal;
            }

            return cuotas;
        }

        // Función para calcular cuota mensual
        function calcularCuota(monto, plazo, tasaMensual) {
            const tasaDecimal = tasaMensual / 100;
            if (tasaDecimal === 0) {
                return monto / plazo;
            }
            return monto * (tasaDecimal * Math.pow(1 + tasaDecimal, plazo)) / (Math.pow(1 + tasaDecimal, plazo) - 1);
        }
    </script>
</body>
</html>
