<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Finexcol</title>
    <style>
        body { font-family: 'Segoe UI'; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 40px; max-width: 600px; }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; box-sizing: border-box; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 120px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .alert { padding: 15px; border-radius: 5px; margin-bottom: 20px; display: none; }
        .alert.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Contacto</h1>
        <p class="subtitle">¿Tienes preguntas? ¡Estamos aquí para ayudarte!</p>
        <div id="successAlert" class="alert success">✅ ¡Gracias! Hemos recibido tu solicitud.</div>
        <form id="contactForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo *</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico *</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="celular">Número de Celular *</label>
                <input type="tel" id="celular" name="celular" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje *</label>
                <textarea id="mensaje" name="mensaje" required></textarea>
            </div>
            <button type="submit">Enviar Solicitud</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('contactForm');
        const successAlert = document.getElementById('successAlert');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            let solicitudes = JSON.parse(localStorage.getItem('solicitudes')) || [];
            solicitudes.push({
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                celular: document.getElementById('celular').value,
                mensaje: document.getElementById('mensaje').value,
                fecha: new Date().toLocaleString('es-CO')
            });
            localStorage.setItem('solicitudes', JSON.stringify(solicitudes));
            successAlert.style.display = 'block';
            form.reset();
            setTimeout(() => { successAlert.style.display = 'none'; }, 3000);
        });
    </script>
</body>
</html>
